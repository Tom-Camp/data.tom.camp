services:
  api:
    image: t0mc4mp/data.tom.camp:latest
    env_file:
      - ./prod.env
    volumes: []
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "5050"
      - --workers
      - "2"
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: shared-db-network
