services:
  api:
    image: t0mc4mp/data.tom.camp:latest
    env_file:
      - ./prod.env
    volumes: []
    ports:
      - "5050:5050"
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "5050"
      - --workers
      - "2"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
